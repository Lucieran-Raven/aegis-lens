[package]
name = "iris"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde.workspace = true
serde-wasm-bindgen = "0.4"
serde_json = "1.0"
getrandom = { version = "0.2", features = ["js"] }
# opencv = "0.88" # Requires LLVM/libclang - add when implementing vision
# mediapipe-rs = "0.1" # Add when implementing face detection

[dev-dependencies]
criterion = "0.5"

# [[bench]]
# name = "performance"
# harness = false

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
