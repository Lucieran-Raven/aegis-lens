name: JavaScript CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/candidate-ui/**'
      - 'packages/hr-dashboard/**'
      - 'packages/signaling/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/candidate-ui/**'
      - 'packages/hr-dashboard/**'
      - 'packages/signaling/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test JavaScript Packages
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        package: [candidate-ui, hr-dashboard, signaling]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
      
      - name: Install dependencies
        run: |
          cd packages/${{ matrix.package }}
          npm ci
      
      - name: Run linter
        run: |
          cd packages/${{ matrix.package }}
          npm run lint --if-present
      
      - name: Run type check
        run: |
          cd packages/${{ matrix.package }}
          npm run type-check --if-present
      
      - name: Run tests
        run: |
          cd packages/${{ matrix.package }}
          npm test --if-present
      
      - name: Build
        run: |
          cd packages/${{ matrix.package }}
          npm run build --if-present
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: hashFiles('packages/${{ matrix.package }}/coverage/lcov.info') != ''
        with:
          file: ./packages/${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.package }}
