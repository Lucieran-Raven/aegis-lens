name: Python CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/nova/**'
      - 'packages/sentient/**'
      - 'packages/aura/**'
      - 'packages/kai/**'
      - 'packages/spider/**'
      - 'packages/oracle/**'
      - 'packages/orchestrator/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/nova/**'
      - 'packages/sentient/**'
      - 'packages/aura/**'
      - 'packages/kai/**'
      - 'packages/spider/**'
      - 'packages/oracle/**'
      - 'packages/orchestrator/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Test Python Packages
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        package: [nova, sentient, aura, kai, spider, oracle, orchestrator]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f packages/${{ matrix.package }}/requirements.txt ]; then
            pip install -r packages/${{ matrix.package }}/requirements.txt
          fi
          pip install pytest pytest-cov flake8 black
      
      - name: Check formatting with black
        run: |
          black --check packages/${{ matrix.package }}
      
      - name: Lint with flake8
        run: |
          flake8 packages/${{ matrix.package }} --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 packages/${{ matrix.package }} --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run tests with pytest
        run: |
          cd packages/${{ matrix.package }}
          pytest --cov=. --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./packages/${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.package }}
