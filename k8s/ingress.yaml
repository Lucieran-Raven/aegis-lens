# AEGIS LENS - Kubernetes Ingress Configuration
# Production-ready ingress with SSL and routing

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-lens-ingress
  namespace: aegis-lens
  annotations:
    # Nginx ingress annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst: "200"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    
    # SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aegis-lens.example.com
        - www.aegis-lens.example.com
      secretName: aegis-lens-tls
  rules:
    - host: aegis-lens.example.com
      http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aegis-api
                port:
                  number: 8000
          
          # WebSocket routes
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: aegis-api
                port:
                  number: 8000
          
          # Health check
          - path: /health
            pathType: Exact
            backend:
              service:
                name: aegis-api
                port:
                  number: 8000
          
          # Frontend (default)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-frontend
                port:
                  number: 3000
    
    - host: www.aegis-lens.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-frontend
                port:
                  number: 3000
